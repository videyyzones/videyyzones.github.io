<!doctype html>
<html lang="id">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VideyProject</title>

<!-- POPUNDER -->
<script>
(function(){
  var s=document.createElement('script');
  s.dataset.zone='11061032';
  s.src='https://al5sm.com/tag.min.js';
  document.head.appendChild(s);
})();

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#000;
color:#fff;
font-family:Arial;
}

header{
position:sticky;
top:0;
background:#111;
padding:14px;
text-align:center;
font-size:18px;
font-weight:bold;
z-index:10;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#111;
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.card video{
width:100%;
height:190px;
object-fit:cover;
background:#000;
display:block;
}

.info{
padding:8px;
}

.info h3{font-size:13px;}
.info p{font-size:11px;color:#aaa;}

.loader{
text-align:center;
padding:15px;
color:#777;
}

</style>

</head>

<body>

<header>VideyProject</header>

<div class="grid" id="grid"></div>
<div class="loader" id="loader">Loading...</div>

<script>

const directLink = "https://omg10.com/4/11061035";

/* 30 VIDEO */
const videos = [
{t:"Video 1",v:"12K views",s:"https://cdn2.videy.co/igNJqKHy1.mp4"},
{t:"Video 2",v:"14K views",s:"https://cdn2.videy.co/0QYBKhmV1.mp4"},
{t:"Video 3",v:"16K views",s:"https://cdn2.videy.co/DiNz1Szz1.mp4"},
{t:"Video 4",v:"18K views",s:"https://cdn2.videy.co/12v5ZzEP1.mp4"},
{t:"Video 5",v:"20K views",s:"https://cdn2.videy.co/IWLlNAKZ1.mp4"},
{t:"Video 6",v:"22K views",s:"https://cdn2.videy.co/LGDnuSQI1.mp4"},
{t:"Video 7",v:"24K views",s:"https://cdn.videy.co/nLwWp4f51.mp4"},
{t:"Video 8",v:"26K views",s:"https://cdn2.videy.co/bg0kXvQf1.mp4"},
{t:"Video 9",v:"28K views",s:"https://cdn2.videy.co/YLewbw831.mp4"},
{t:"Video 10",v:"30K views",s:"https://cdn2.videy.co/HLWpqAOZ1.mp4"},

{t:"Video 11",v:"32K views",s:"https://cdn2.videy.co/2n646kwX1.mp4"},
{t:"Video 12",v:"34K views",s:"https://cdn2.videy.co/AqCUxP2y1.mp4"},
{t:"Video 13",v:"36K views",s:"https://cdn2.videy.co/qffO9dm01.mp4"},
{t:"Video 14",v:"38K views",s:"https://cdn2.videy.co/g990Y5yW1.mp4"},
{t:"Video 15",v:"40K views",s:"https://cdn.videy.co/OjbbA9Uk1.mp4"},

{t:"Video 16",v:"42K views",s:"https://cdn.videy.co/HQvTWWGl1.mp4"},
{t:"Video 17",v:"44K views",s:"https://cdn.videy.co/FxX6Vs0R1.mp4"},
{t:"Video 18",v:"46K views",s:"https://cdn.videy.co/nFWeJvQx1.mp4"},
{t:"Video 19",v:"48K views",s:"https://cdn.videy.co/D56Hk8u21.mp4"},
{t:"Video 20",v:"50K views",s:"https://cdn.videy.co/HNC4B1Iw1.mp4"},

{t:"Video 21",v:"52K views",s:"https://cdn.videy.co/HR6hFrEL1.mp4"},
{t:"Video 22",v:"54K views",s:"https://cdn.videy.co/Q9xPGYrQ1.mp4"},
{t:"Video 23",v:"56K views",s:"https://cdn.videy.co/8W5WG7YN1.mp4"},
{t:"Video 24",v:"58K views",s:"https://cdn.videy.co/ChAGdJVY1.mp4"},
{t:"Video 25",v:"60K views",s:"https://cdn.videy.co/tkENRJhA1.mp4"},

{t:"Video 26",v:"62K views",s:"https://cdn.videy.co/P0IKeIuz1.mp4"},
{t:"Video 27",v:"64K views",s:"https://cdn.videy.co/7QkJqpjX1.mp4"},
{t:"Video 28",v:"66K views",s:"https://cdn.videy.co/bucZLATR1.mp4"},
{t:"Video 29",v:"68K views",s:"https://cdn.videy.co/nJCvaRmL1.mp4"},
{t:"Video 30",v:"70K views",s:"https://cdn.videy.co/lIWiiz8i1.mp4"}
];

let index = 0;
const batch = 10;

const grid = document.getElementById("grid");
const loader = document.getElementById("loader");

function loadMore(){

videos.slice(index, index + batch).forEach(v=>{

const el=document.createElement("div");
el.className="card";

el.innerHTML=`
<video muted playsinline preload="metadata"></video>
<div class="info">
<h3>${v.t}</h3>
<p>${v.v}</p>
</div>
`;

const video = el.querySelector("video");
video.src = v.s;

el.onclick = () => {

  // 1x funnel saja (stabil CPM)
  window.open(directLink,'_blank');

  openPlayer(v.s);

};

grid.appendChild(el);

});

index += batch;

loader.innerText = index >= videos.length ? "End" : "Scroll untuk load...";
}

/* player overlay ringan */
function openPlayer(src){

const box=document.createElement("div");
box.style.cssText=`
position:fixed;
inset:0;
background:#000;
z-index:999;
display:flex;
align-items:center;
justify-content:center;
`;

box.innerHTML=`
<video controls autoplay playsinline style="width:100%;height:100%;">
<source src="${src}">
</video>
`;

box.onclick=()=>box.remove();

document.body.appendChild(box);

}

/* scroll lazy load */
window.addEventListener("scroll",()=>{
if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 200){
loadMore();
}
});

loadMore();

</script>

</body>
</html>

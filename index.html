<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VIdeyProject</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#fff;font-family:Arial;}

header{
position:sticky;top:0;
background:#111;
padding:14px;
text-align:center;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#111;
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

video{
width:100%;
height:180px;
object-fit:cover;
background:#000;
}

.info{padding:8px;}
.info h3{font-size:13px;}
.info p{font-size:11px;color:#aaa;}
</style>
</head>

<body>

<header>VideyProject</header>

<div class="grid" id="grid"></div>

<script>

const videos = [
"https://cdn2.videy.co/igNJqKHy1.mp4",
"https://cdn2.videy.co/0QYBKhmV1.mp4",
"https://cdn2.videy.co/DiNz1Szz1.mp4",
"https://cdn2.videy.co/12v5ZzEP1.mp4",
"https://cdn2.videy.co/IWLlNAKZ1.mp4",

"https://cdn2.videy.co/LGDnuSQI1.mp4",
"https://cdn.videy.co/bFR9unDs1.mp4",
"https://cdn.videy.co/nLwWp4f51.mp4",
"https://cdn2.videy.co/bg0kXvQf1.mp4",
"https://cdn2.videy.co/YLewbw831.mp4",

"https://cdn2.videy.co/HLWpqAOZ1.mp4",
"https://cdn2.videy.co/2n646kwX1.mp4",
"https://cdn2.videy.co/AqCUxP2y1.mp4",
"https://cdn2.videy.co/qffO9dm01.mp4",
"https://cdn2.videy.co/g990Y5yW1.mp4",

"https://cdn.videy.co/OjbbA9Uk1.mp4",
"https://cdn.videy.co/HQvTWWGl1.mp4",
"https://cdn.videy.co/FxX6Vs0R1.mp4",
"https://cdn.videy.co/nFWeJvQx1.mp4",
"https://cdn.videy.co/D56Hk8u21.mp4",

"https://cdn.videy.co/HNC4B1Iw1.mp4",
"https://cdn.videy.co/HR6hFrEL1.mp4",
"https://cdn.videy.co/Q9xPGYrQ1.mp4",
"https://cdn.videy.co/8W5WG7YN1.mp4",
"https://cdn.videy.co/ChAGdJVY1.mp4",

"https://cdn.videy.co/tkENRJhA1.mp4",
"https://cdn.videy.co/P0IKeIuz1.mp4",
"https://cdn.videy.co/7QkJqpjX1.mp4",
"https://cdn.videy.co/bucZLATR1.mp4"
];

const grid=document.getElementById("grid");

videos.forEach((v,i)=>{

let el=document.createElement("div");
el.className="card";

el.innerHTML=`
<video muted playsinline preload="metadata" src="${v}"></video>
<div class="info">
<h3>Video ${i+1}</h3>
<p>Trending</p>
</div>
`;

el.onclick=()=>{
window.location.href="go.html?vid="+encodeURIComponent(v);
};

grid.appendChild(el);

});

</script>

</body>
</html>

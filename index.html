<!doctype html>
<html lang="id">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VideyProject</title>

<!-- POPUNDER (1x saja, stabil) -->
<script>
(function(){
  var s=document.createElement('script');
  s.dataset.zone='11061032';
  s.src='https://al5sm.com/tag.min.js';
  document.head.appendChild(s);
})();
</script>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#000;
color:#fff;
font-family:Arial;
overflow-x:hidden;
}

/* HEADER */
header{
position:fixed;
top:0;
left:0;
right:0;
background:#111;
padding:12px;
text-align:center;
font-weight:bold;
z-index:10;
}

/* FEED */
.feed{
margin-top:50px;
}

.video{
position:relative;
width:100%;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#000;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

/* overlay info */
.info{
position:absolute;
bottom:20px;
left:10px;
background:rgba(0,0,0,0.4);
padding:6px 10px;
border-radius:8px;
font-size:12px;
}

</style>

</head>

<body>

<header>VideyProject</header>

<div class="feed" id="feed"></div>

<script>

const directLink = "https://omg10.com/4/11061035";

/* 30 VIDEO */
const videos = [
{t:"Video 1",s:"https://cdn2.videy.co/igNJqKHy1.mp4"},
{t:"Video 2",s:"https://cdn2.videy.co/0QYBKhmV1.mp4"},
{t:"Video 3",s:"https://cdn2.videy.co/DiNz1Szz1.mp4"},
{t:"Video 4",s:"https://cdn2.videy.co/12v5ZzEP1.mp4"},
{t:"Video 5",s:"https://cdn2.videy.co/IWLlNAKZ1.mp4"},
{t:"Video 6",s:"https://cdn2.videy.co/LGDnuSQI1.mp4"},
{t:"Video 7",s:"https://cdn.videy.co/nLwWp4f51.mp4"},
{t:"Video 8",s:"https://cdn2.videy.co/bg0kXvQf1.mp4"},
{t:"Video 9",s:"https://cdn2.videy.co/YLewbw831.mp4"},
{t:"Video 10",s:"https://cdn2.videy.co/HLWpqAOZ1.mp4"},

{t:"Video 11",s:"https://cdn2.videy.co/2n646kwX1.mp4"},
{t:"Video 12",s:"https://cdn2.videy.co/AqCUxP2y1.mp4"},
{t:"Video 13",s:"https://cdn2.videy.co/qffO9dm01.mp4"},
{t:"Video 14",s:"https://cdn2.videy.co/g990Y5yW1.mp4"},
{t:"Video 15",s:"https://cdn.videy.co/OjbbA9Uk1.mp4"},

{t:"Video 16",s:"https://cdn.videy.co/HQvTWWGl1.mp4"},
{t:"Video 17",s:"https://cdn.videy.co/FxX6Vs0R1.mp4"},
{t:"Video 18",s:"https://cdn.videy.co/nFWeJvQx1.mp4"},
{t:"Video 19",s:"https://cdn.videy.co/D56Hk8u21.mp4"},
{t:"Video 20",s:"https://cdn.videy.co/HNC4B1Iw1.mp4"},

{t:"Video 21",s:"https://cdn.videy.co/HR6hFrEL1.mp4"},
{t:"Video 22",s:"https://cdn.videy.co/Q9xPGYrQ1.mp4"},
{t:"Video 23",s:"https://cdn.videy.co/8W5WG7YN1.mp4"},
{t:"Video 24",s:"https://cdn.videy.co/ChAGdJVY1.mp4"},
{t:"Video 25",s:"https://cdn.videy.co/tkENRJhA1.mp4"},

{t:"Video 26",s:"https://cdn.videy.co/P0IKeIuz1.mp4"},
{t:"Video 27",s:"https://cdn.videy.co/7QkJqpjX1.mp4"},
{t:"Video 28",s:"https://cdn.videy.co/bucZLATR1.mp4"},
{t:"Video 29",s:"https://cdn.videy.co/nJCvaRmL1.mp4"},
{t:"Video 30",s:"https://cdn.videy.co/lIWiiz8i1.mp4"}
];

const feed = document.getElementById("feed");

/* buat semua video jadi scroll feed */
videos.forEach((v,i)=>{

const box=document.createElement("div");
box.className="video";

box.innerHTML=`
<video muted playsinline loop preload="metadata" src="${v.s}"></video>
<div class="info">${v.t}</div>
`;

const video=box.querySelector("video");

/* autoplay saat terlihat (RPM booster) */
const observer=new IntersectionObserver((entries)=>{
entries.forEach(e=>{
if(e.isIntersecting){
video.play().catch(()=>{});
}
});
},{threshold:0.7});

observer.observe(video);

/* monetisasi trigger */
let clicked=false;

box.onclick=()=>{

if(!clicked){

clicked=true;

/* soft delay (naikkan value traffic) */
setTimeout(()=>{
window.open(directLink,'_blank');
},600);

}

openPlayer(v.s);

};

feed.appendChild(box);

});

/* PLAYER ringan */
function openPlayer(src){

const el=document.createElement("div");
el.style.cssText=`
position:fixed;
inset:0;
background:#000;
z-index:999;
display:flex;
align-items:center;
justify-content:center;
`;

el.innerHTML=`
<video controls autoplay playsinline style="width:100%;height:100%;">
<source src="${src}">
</video>
`;

el.onclick=()=>el.remove();

document.body.appendChild(el);

}

</script>

</body>
</html>

<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Viral Video Feed</title>

<style>
body{margin:0;background:#000;overflow:hidden;font-family:Arial}

#feed{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.video{
height:100vh;
scroll-snap-align:start;
position:relative;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

.info{
position:absolute;
bottom:80px;
left:10px;
color:#fff;
text-shadow:0 0 5px #000;
}

.btn{
position:absolute;
bottom:30px;
right:10px;
background:red;
padding:10px;
border-radius:8px;
color:#fff;
font-size:12px;
}
</style>
</head>

<body>

<div id="feed"></div>

<script>

/* ================= MONETIZATION ================= */
const popunderLink = "YOUR_POPUNDER_LINK";
const directLink = "YOUR_DIRECTLINK";

/* ================= VIDEO ================= */
const videos = [
"https://cdn.videy.co/nJCvaRmL1.mp4",
"https://cdn.videy.co/lIWiiz8i1.mp4",
"https://cdn.videy.co/apgoEF561.mp4",
"https://cdn.videy.co/kqwXpa2F1.mp4",
"https://cdn.videy.co/q1xn9c9E1.mp4"
];

let count = 0;
let popLock = false;

const feed = document.getElementById("feed");

/* POPUNDER */
function openPop(){
if(popLock) return;

popLock = true;
window.open(popunderLink, "_blank");

setTimeout(()=>{
popLock = false;
},8000);
}

/* DIRECT LINK */
function openDirect(){
window.open(directLink, "_blank");
}

/* VIDEO ENGINE */
function createVideo(src,i){

const div = document.createElement("div");
div.className="video";

div.innerHTML=`
<video src="${src}" muted playsinline loop></video>
<div class="info">Video ${i+1}</div>
<div class="btn">Continue</div>
`;

const video = div.querySelector("video");

/* autoplay */
const obs = new IntersectionObserver((e)=>{
e.forEach(x=>{
if(x.isIntersecting){
video.play().catch(()=>{});
}else{
video.pause();
}
});
},{threshold:0.7});

obs.observe(div);

/* directlink button */
div.querySelector(".btn").onclick=(e)=>{
e.stopPropagation();
openDirect();
};

/* soft monetization trigger */
div.addEventListener("click",()=>{
count++;

/* POPUNDER setiap beberapa interaksi */
if(count % 8 === 0){
openPop();
}
});

feed.appendChild(div);
}

videos.forEach(createVideo);

</script>

</body>
</html>

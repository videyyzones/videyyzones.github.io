<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VideyProject</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#fff;font-family:Arial;}

header{
position:sticky;
top:0;
background:#111;
padding:14px;
text-align:center;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#111;
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

video{
width:100%;
height:180px;
object-fit:cover;
background:#000;
}

.info{padding:8px;}
.info h3{font-size:13px;}
.info p{font-size:11px;color:#aaa;}
</style>
</head>

<body>

<header>VideyProject</header>

<div class="grid" id="grid"></div>

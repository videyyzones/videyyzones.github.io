<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>avtube</title>

<style>
body{margin:0;background:#000;font-family:Arial;color:#fff}

header{
  text-align:center;
  padding:10px;
  font-weight:bold;
}

video{
  width:100%;
  height:65vh;
  object-fit:cover;
  background:#000;
}

.info{
  text-align:center;
  font-size:13px;
  opacity:0.8;
  padding:6px;
}

.btn{
  background:#fff;
  color:#000;
  text-align:center;
  padding:12px;
  font-weight:bold;
  cursor:pointer;
  margin:5px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  padding:10px;
}

.item video{
  width:100%;
  border-radius:6px;
}
</style>
</head>

<body>

<header>AVTUBE</header>

<video id="player" controls></video>

<div class="info" id="info">Klik PLAY untuk mulai</div>

<div class="btn" onclick="startVideo()">▶ PLAY</div>
<div class="btn" onclick="nextVideo()">⏭ NEXT</div>

<div class="grid" id="grid"></div>

<script>
let data = [];
let index = 0;
let started = false;

// LOAD DATA
fetch('videos.json?v=' + Date.now())
.then(r => r.json())
.then(res => {
  data = res;
  data.sort((a,b)=> a.series.localeCompare(b.series));
  render();
});

// START MANUAL (NO AUTO PLAY)
function startVideo(){
  if(!started){
    started = true;
    load();
  }
}

// LOAD VIDEO
function load(){
  let v = data[index];
  player.src = v.file;

  document.getElementById("info").innerText =
    `Series ${v.series} • ${v.title}`;
}

// NEXT LOGIC SERIES
function getNext(){
  let series = data[index].series;

  let next = data.findIndex((v,i)=>
    i > index && v.series === series
  );

  if(next === -1){
    next = index + 1;
    if(next >= data.length) next = 0;
  }

  return next;
}

// NEXT VIDEO
function nextVideo(){
  index = getNext();
  load();
}

// GRID
function render(){
  let html = "";

  data.forEach((v,i)=>{
    html += `
      <div class="item" onclick="go(${i})">
        <video src="${v.file}"></video>
      </div>
    `;
  });

  grid.innerHTML = html;
}

function go(i){
  index = i;
  load();
}
</script>

</body>
  </html>

<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Video Feed</title>

<style>
body{margin:0;background:#000;overflow:hidden;font-family:Arial}

#feed{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.video{
height:100vh;
scroll-snap-align:start;
position:relative;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

.info{
position:absolute;
bottom:80px;
left:10px;
color:#fff;
text-shadow:0 0 5px #000;
}

.btn{
position:absolute;
bottom:30px;
right:10px;
background:red;
padding:10px;
border-radius:8px;
color:#fff;
font-size:12px;
}
</style>
</head>

<body>

<div id="feed"></div>

];

const feed = document.getElementById("feed");

videos.forEach((src,i)=>{

const div = document.createElement("div");
div.className="video";

div.innerHTML=`
<video src="${src}" muted playsinline loop></video>
<div class="info">Video ${i+1}</div>
<div class="btn">Like ❤️</div>
`;

const video = div.querySelector("video");

const obs = new IntersectionObserver((e)=>{
e.forEach(x=>{
if(x.isIntersecting){
video.play().catch(()=>{});
}else{
video.pause();
}
});
},{threshold:0.7});

obs.observe(div);

/* optional monetization button */
div.querySelector(".btn").onclick=()=>{
window.open(offerLink,"_blank");
};

feed.appendChild(div);
});

</script>

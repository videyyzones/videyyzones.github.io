name: Auto Update Videos

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Shuffle JSON
      run: |
        node -e "
        const fs=require('fs');
        let d=JSON.parse(fs.readFileSync('videos.json'));
        d.sort(()=>Math.random()-0.5);
        fs.writeFileSync('videos.json',JSON.stringify(d,null,2));
        "

    - name: Commit
      run: |
        git config --global user.name 'bot'
        git config --global user.email 'bot@users.noreply.github.com'
        git add .
        git commit -m 'auto update' || echo 'no change'
        git push

<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Player</title>
</head>

<body style="margin:0;background:#000;color:#fff;font-family:Arial;text-align:center">

<script>

const url = new URLSearchParams(location.search);
const video = url.get("vid");

// tampilkan video langsung (PASTI BISA DIPUTAR)
document.body.innerHTML = `
<video controls autoplay style="width:100%;height:100vh;background:#000">
<source src="${video}" type="video/mp4">
</video>
`;

// funnel monetisasi (aman + tidak crash)
setTimeout(()=>{
  window.location.href = "https://omg10.com/4/11061035";
}, 2500);

</script>

</body>
</html>

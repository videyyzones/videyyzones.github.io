<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video</title>

<style>
body{margin:0;background:#000;}
video{width:100%;height:100vh;object-fit:cover;}
</style>
</head>

<body>

<!-- POPUNDER -->
<script src="https://pl28936974.profitablecpmratenetwork.com/7d/e5/21/7de5216dc283a24e545f9b8a0cdb49a9.js"></script>

<video id="player" controls autoplay playsinline></video>

<script>
const url = new URLSearchParams(location.search);
const id = parseInt(url.get("id")||"0",10);

let videos=[], done=false;

fetch("videos.json")
.then(r=>r.json())
.then(d=>{
  videos=d;
  document.getElementById("player").src = d[id]?.file || d[0].file;
});

// Smartlink saat selesai nonton (lebih “mahal”)
document.getElementById("player").addEventListener("ended", ()=>{
  if(!done){
    done=true;
    window.open("https://www.profitablecpmratenetwork.com/gjhx83kgx?key=441f9e13794f2dee405c64d3960bed10","_blank");
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>avtube</title>

<style>
body{margin:0;background:#000}
.header{
  text-align:center;
  color:#fff;
  padding:10px;
  font-weight:bold;
}
video{
  width:100%;
  height:calc(100vh - 40px);
  object-fit:cover;
}
</style>
</head>

<body>

<div class="header">avtube</div>

<!-- POPUNDER -->
<script>
(function(s){
  s.dataset.zone='10908808',
  s.src='https://al5sm.com/tag.min.js'
})
([document.documentElement, document.body].pop().appendChild(document.createElement('script')));
</script>

<video id="player" controls></video>

<script>
let triggered = false;

// ambil id
let id=new URLSearchParams(location.search).get("id");

// load video
fetch('videos.json?v='+Date.now())
.then(r=>r.json())
.then(data=>{
  let v=data.find(x=>x.id==id);
  if(v) player.src=v.file;
});

// trigger setelah 5 detik (HIGH CPM)
player.addEventListener("timeupdate", () => {
  if (!triggered && player.currentTime > 5) {
    triggered = true;

    // trigger popunder natural
    document.body.click();
  }
});
</script>

</body>
</html>
